version: "3"
services:
  webserver:
    container_name: todo-webserver
    build:
      context: ./.docker/webserver
      dockerfile: Dockerfile
    ports:
      - ${HTTP_PORT}:80
    volumes:
      - ./todo-react/dist:/usr/share/nginx/html
    networks:
      - todo-network

networks:
  todo-network:
    external: true
